* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:"Segoe UI",Tahoma,sans-serif; background:var(--bg); color:#333; }
.header { background:linear-gradient(135deg,#8B0000,#5C0000); color:white; padding:20px 30px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; }
.header h1 { font-size:1.5rem; } .header .subtitle { color:#FFB74D; font-size:0.9rem; }
.header .meta { font-size:0.8rem; opacity:0.8; text-align:right; }
.filtro-tag { display:inline-block; background:rgba(255,183,77,0.3); padding:2px 8px; border-radius:10px; font-size:0.7rem; margin-top:4px; }
.container { max-width:1400px; margin:0 auto; padding:20px; }
.btn-print { background:var(--gold); color:white; border:none; padding:6px 14px; border-radius:6px; cursor:pointer; font-size:0.8rem; }

/* KPI Cards - CLICKEABLES */
.kpi-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin-bottom:20px; }
.kpi-card { background:white; border-radius:10px; padding:15px; box-shadow:0 2px 8px rgba(0,0,0,0.08); border-left:4px solid var(--red); cursor:pointer; transition:all 0.2s; position:relative; }
.kpi-card:hover { transform:translateY(-2px); box-shadow:0 4px 15px rgba(0,0,0,0.15); }
.kpi-card.active-filter { outline:3px solid var(--gold); transform:translateY(-2px); }
.kpi-card .label { font-size:0.7rem; color:var(--gray); text-transform:uppercase; letter-spacing:0.5px; }
.kpi-card .value { font-size:1.6rem; font-weight:700; color:#8B0000; margin:4px 0; }
.kpi-card .detail { font-size:0.75rem; color:#666; }
.kpi-card.orange { border-left-color:var(--orange); }
.kpi-card.blue { border-left-color:var(--blue); }
.kpi-card.gray { border-left-color:var(--gray); }
.kpi-card .click-hint { font-size:0.6rem; color:var(--blue); position:absolute; bottom:4px; right:8px; opacity:0; transition:opacity 0.2s; }
.kpi-card:hover .click-hint { opacity:1; }
.btn-clear { font-size:0.7rem; background:#eee; border:none; padding:3px 10px; border-radius:10px; cursor:pointer; color:#666; margin-left:10px; }
.btn-clear:hover { background:#ddd; }
.filter-label { font-size:0.75rem; font-weight:400; color:var(--gold); background:#fff8e1; padding:2px 10px; border-radius:12px; display:none; }
.filter-label.show { display:inline-block; }

/* Tabs */
.tabs { display:flex; gap:0; margin-bottom:0; }
.tab { padding:10px 22px; background:#ddd; border:none; cursor:pointer; font-size:0.9rem; font-weight:600; color:#666; border-radius:8px 8px 0 0; }
.tab.active { background:white; color:var(--navy); }
.tab-content { display:none; background:white; border-radius:0 10px 10px 10px; padding:22px; box-shadow:0 2px 8px rgba(0,0,0,0.08); margin-bottom:18px; }
.tab-content.active { display:block; }
.section h2 { color:#8B0000; font-size:1.15rem; margin-bottom:12px; padding-bottom:6px; border-bottom:2px solid var(--orange); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }

/* Tables */
.table-controls { display:flex; gap:10px; margin-bottom:12px; align-items:center; flex-wrap:wrap; }
.search-input { padding:7px 14px; border:1px solid #ddd; border-radius:20px; font-size:0.85rem; width:250px; outline:none; }
.search-input:focus { border-color:var(--blue); box-shadow:0 0 0 2px rgba(46,111,173,0.15); }
select.filter-select { padding:7px 12px; border:1px solid #ddd; border-radius:20px; font-size:0.82rem; outline:none; }
.table-wrapper { overflow-x:auto; max-height:600px; overflow-y:auto; }
table { width:100%; border-collapse:collapse; font-size:0.78rem; }
th { background:#8B0000; color:white; padding:8px 6px; text-align:center; white-space:nowrap; position:sticky; top:0; cursor:pointer; user-select:none; z-index:2; }
th:hover { background:var(--blue); }
th.sorted-asc::after { content:" \25B2"; font-size:0.6rem; } th.sorted-desc::after { content:" \25BC"; font-size:0.6rem; }
td { padding:6px; border-bottom:1px solid #eee; }
tr.data-row { cursor:pointer; }
tr.data-row:hover { background:#fff5f5; }
.text-right { text-align:right; } .text-center { text-align:center; } .text-left { text-align:left; }
.badge { display:inline-block; padding:2px 8px; border-radius:12px; font-size:0.72rem; font-weight:600; }
.b-red { background:#f8d7da; color:#721c24; } .b-orange { background:#fff3cd; color:#856404; }
.b-blue { background:#d1ecf1; color:#0c5460; } .b-green { background:#d4edda; color:#155724; }

/* Comprador cards (resumen tab) */
.comp-cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:15px; margin-top:15px; }
.comp-card { background:white; border-radius:10px; padding:16px; box-shadow:0 2px 8px rgba(0,0,0,0.08); border-top:3px solid #8B0000; cursor:pointer; transition:all 0.2s; }
.comp-card:hover { transform:translateY(-2px); box-shadow:0 4px 15px rgba(0,0,0,0.12); border-top-color:var(--gold); }
.comp-card .name { font-size:1rem; font-weight:700; color:#8B0000; margin-bottom:8px; }
.comp-card .metrics { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; }
.comp-card .metric { padding:5px 8px; background:var(--bg); border-radius:6px; text-align:center; }
.comp-card .m-label { font-size:0.65rem; color:var(--gray); }
.comp-card .m-value { font-size:0.9rem; font-weight:600; color:var(--navy); }
.comp-card .expand-hint { font-size:0.6rem; color:var(--blue); text-align:center; margin-top:6px; opacity:0.7; }

/* Charts */
.charts-grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
.chart-box { background:white; border-radius:10px; padding:18px; box-shadow:0 2px 8px rgba(0,0,0,0.08); }
.chart-box h3 { color:#8B0000; font-size:0.95rem; margin-bottom:8px; }

/* Alerts */
.alert-box { padding:12px 16px; border-radius:8px; margin-bottom:10px; font-size:0.85rem; cursor:pointer; transition:background 0.2s; }
.alert-box:hover { filter:brightness(0.95); }
.alert-red { background:#f8d7da; border-left:4px solid var(--red); color:#721c24; }
.alert-orange { background:#fff3cd; border-left:4px solid var(--orange); color:#856404; }
.alert-blue { background:#d1ecf1; border-left:4px solid var(--blue); color:#0c5460; }

/* OVERLAY MODAL */
.overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:100; justify-content:center; align-items:flex-start; padding:40px 20px; overflow-y:auto; }
.overlay.show { display:flex; }
.overlay-card { background:white; border-radius:12px; max-width:950px; width:100%; padding:30px; position:relative; box-shadow:0 10px 40px rgba(0,0,0,0.3); }
.overlay-close { position:absolute; top:12px; right:16px; font-size:1.5rem; cursor:pointer; color:var(--gray); border:none; background:none; }
.overlay-close:hover { color:var(--red); }
.overlay-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; padding-bottom:12px; border-bottom:2px solid var(--gold); }
.overlay-header h2 { color:#8B0000; font-size:1.3rem; }

.overlay-metric .om-label { font-size:0.7rem; color:var(--gray); text-transform:uppercase; }
.overlay-metric .om-value { font-size:1.2rem; font-weight:700; color:#8B0000; }
.overlay-charts { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
.overlay-chart-box { padding:15px; border:1px solid #eee; border-radius:8px; }
.overlay-chart-box h4 { color:var(--navy); font-size:0.85rem; margin-bottom:8px; }
.overlay-detail { margin-top:15px; }
.overlay-detail h4 { color:var(--navy); font-size:0.9rem; margin-bottom:8px; }
.ov-table { width:100%; font-size:0.78rem; border-collapse:collapse; }
.ov-table th { background:#8B0000; color:white; padding:6px; text-align:center; }
.ov-table td { padding:5px 6px; border-bottom:1px solid #eee; }
.ov-table tr:hover { background:#fff5f5; }

@media print { .tabs,.btn-print,.table-controls,.click-hint,.expand-hint,.overlay{display:none!important;} .tab-content{display:block!important;} }
@media (max-width:768px) { .charts-grid,.overlay-charts{grid-template-columns:1fr;} .kpi-row{grid-template-columns:repeat(2,1fr);} .comp-cards{grid-template-columns:1fr;} .overlay-card{padding:20px;} }
</style>
</head>

function applyKpiFilter(filter){
  if(activeKpiFilter===filter){clearKpiFilter();return;}
  activeKpiFilter=filter;
  document.querySelectorAll(".kpi-card").forEach(c=>c.classList.remove("active-filter"));
  var labels={"all_oc":"Mostrando: Todas las OC","vencidas":"Mostrando: Solo lineas vencidas","activo":"Mostrando: OC en estatus Activo","all_sol":"Mostrando: Todas las solicitudes","rechazadas":"Mostrando: Solicitudes rechazadas"};
  $("filter-lbl").textContent=labels[filter]||filter;
  $("filter-status").style.display="block";
  // Highlight active KPI
  kpis.forEach(k=>{ if(k.filter===filter) $(k.id).classList.add("active-filter"); });
  // Switch tab based on filter
  if(filter==="all_sol"||filter==="rechazadas"){
    showTab("sol",document.querySelectorAll(".tab")[2]);
    if(filter==="rechazadas") $("sol-est-filter").value="echazada"; else $("sol-est-filter").value="";
    filterSOL();
  } else {
    showTab("oc",document.querySelectorAll(".tab")[1]);
    if(filter==="vencidas"){ $("oc-venc-filter").value="si"; $("oc-est-filter").value=""; }
    else if(filter==="activo"){ $("oc-est-filter").value="Activo"; $("oc-venc-filter").value=""; }
    else { $("oc-est-filter").value=""; $("oc-venc-filter").value=""; }
    filterOC();
  }
}
function clearKpiFilter(){
  activeKpiFilter=null;
  document.querySelectorAll(".kpi-card").forEach(c=>c.classList.remove("active-filter"));
  $("filter-status").style.display="none";
  $("oc-est-filter").value=""; $("oc-venc-filter").value=""; $("oc-search").value=""; $("oc-comp-filter").value="";
  if($("sol-est-filter")) { $("sol-est-filter").value=""; $("sol-search").value=""; $("sol-comp-filter").value=""; }

}

function renderOC(list){

      +'<td class="text-right">'+d.cant+'</td><td class="text-right">'+d.em+'</td>'
      +'<td class="text-right">'+(d.pend>0?"<b>"+d.pend+"</b>":d.pend)+'</td>'
      +'<td class="text-right">'+fmt(d.val)+'</td><td class="text-center">'+d.fe_ent+'</td>'
      +'<td class="text-center"><span class="badge '+vcls+'">'+vlbl+'</span></td></tr>';
  });

function filterOC(){
  var q=$("oc-search").value.toLowerCase(),c=$("oc-comp-filter").value,e=$("oc-est-filter").value,v=$("oc-venc-filter").value;
  var f=OC.filter(d=>{
    if(q&&d.doc.toLowerCase().indexOf(q)<0&&d.mat.toLowerCase().indexOf(q)<0&&d.prov.toLowerCase().indexOf(q)<0) return false;
    if(c&&d.comp!==c) return false;
    if(e&&d.est.indexOf(e)<0) return false;
    if(v==="si"&&!d.venc) return false;
    if(v==="no"&&d.venc) return false;
    return true;
  });
  renderOC(f);
}
function sortOC(col){
  var keys=["doc","pos","mat","prov","comp","est","cant","em","pend","val","fe_ent","dias"];
  if(ocSortCol===col) ocSortDir*=-1; else { ocSortCol=col; ocSortDir=1; }
  OC.sort((a,b)=>{var va=a[keys[col]],vb=b[keys[col]]; if(va<vb)return -ocSortDir; if(va>vb)return ocSortDir; return 0;});
  filterOC();
}
renderOC(OC);

// === SOL TAB ===
var solHTML='<h2 style="color:#8B0000;border-bottom:2px solid #F39C12;padding-bottom:6px">Solicitudes No Concluidas ('+totLinSol+' lineas)</h2>';
solHTML+='<div class="table-controls"><input class="search-input" id="sol-search" placeholder="Buscar solicitud, material..." oninput="filterSOL()">';
solHTML+='<select class="filter-select" id="sol-comp-filter" onchange="filterSOL()"><option value="">Todos</option>';
Object.keys(compSOL).sort().forEach(c=>{solHTML+='<option value="'+c+'">'+c+'</option>';});
solHTML+='</select><select class="filter-select" id="sol-est-filter" onchange="filterSOL()"><option value="">Todos</option><option value="proceso">En proceso</option><option value="echazada">Rechazada</option><option value="Activa">Activa</option></select></div>';
solHTML+='<div class="table-wrapper"><table><thead><tr><th onclick="sortSOL(0)">No. Solicitud</th><th onclick="sortSOL(1)" class="text-left">Material</th><th onclick="sortSOL(2)">Comprador</th><th onclick="sortSOL(3)">Estatus</th><th onclick="sortSOL(4)">Cantidad</th><th onclick="sortSOL(5)">Fecha Sol.</th><th onclick="sortSOL(6)">Dias Espera</th></tr></thead><tbody id="sol-tbody"></tbody></table></div>';
$("tab-sol").innerHTML=solHTML;

var solSortCol=-1,solSortDir=1;
function renderSOL(list){
  var h="";
  list.forEach(d=>{
    var ecls=d.est.includes("echazada")?"b-red":d.est.includes("proceso")?"b-orange":"b-blue";
    h+='<tr class="data-row" onclick="openOverlay(\''+d.comp.replace(/'/g,"\\'")+'\')">'
      +'<td class="text-center">'+d.nsol+'</td><td class="text-left">'+d.mat+'</td>'
      +'<td class="text-center">'+d.comp+'</td>'
      +'<td class="text-center"><span class="badge '+ecls+'">'+d.est+'</span></td>'
      +'<td class="text-right">'+d.cant+'</td><td class="text-center">'+d.fe_sol+'</td>'
      +'<td class="text-center">'+d.dias+'</td></tr>';
  });
  $("sol-tbody").innerHTML=h;
}
function filterSOL(){
  var q=$("sol-search").value.toLowerCase(),c=$("sol-comp-filter").value,e=$("sol-est-filter").value;
  var f=SOL.filter(d=>{
    if(q&&d.nsol.toLowerCase().indexOf(q)<0&&d.mat.toLowerCase().indexOf(q)<0) return false;
    if(c&&d.comp!==c) return false;
    if(e&&d.est.indexOf(e)<0) return false;
    return true;
  });
  renderSOL(f);
}
function sortSOL(col){
  var keys=["nsol","mat","comp","est","cant","fe_sol","dias"];
  if(solSortCol===col) solSortDir*=-1; else { solSortCol=col; solSortDir=1; }
  SOL.sort((a,b)=>{var va=a[keys[col]],vb=b[keys[col]]; if(va<vb)return -solSortDir; if(va>vb)return solSortDir; return 0;});
  filterSOL();
}
renderSOL(SOL);

// === OVERLAY MODAL ===
var ovChartProv=null, ovChartEst=null;
function openOverlay(name){
  var oc=compOC[name], sol=compSOL[name];
  $("ov-title").textContent=name;

  // Metrics
  var metrics=[];
  if(oc){
    metrics.push({l:"OC Unicas",v:oc.oc.size});
    metrics.push({l:"Lineas OC",v:oc.lin});
    metrics.push({l:"Vencidas",v:oc.venc});
    metrics.push({l:"Valor Total",v:fmt(oc.val)});
    metrics.push({l:"% Vencido",v:(oc.lin>0?Math.round(oc.venc/oc.lin*100):0)+"%"});
    metrics.push({l:"Proveedores",v:Object.keys(oc.provs).length});
  }
  if(sol){
    metrics.push({l:"Solicitudes",v:sol.lin});
    metrics.push({l:"Rechazadas",v:sol.rech});
  }
  $("ov-metrics").innerHTML=metrics.map(m=>
    '<div class="overlay-metric"><div class="om-label">'+m.l+'</div><div class="om-value">'+m.v+'</div></div>'
  ).join("");

  // Proveedores chart
  if(ovChartProv){ ovChartProv.destroy(); ovChartProv=null; }
  if(ovChartEst){ ovChartEst.destroy(); ovChartEst=null; }

  if(oc){
    var provArr=Object.entries(oc.provs).sort((a,b)=>b[1]-a[1]).slice(0,8);
    ovChartProv=new Chart($("ov-chart-prov"),{
      type:"bar",
      data:{labels:provArr.map(p=>p[0].length>25?p[0].substring(0,25)+"...":p[0]),datasets:[{label:"Lineas",data:provArr.map(p=>p[1]),backgroundColor:"#8B0000"}]},
      options:{responsive:true,indexAxis:"y",plugins:{legend:{display:false}},scales:{x:{beginAtZero:true}}}
    });

    var estArr=Object.entries(oc.byEst);
    var estColors={"Activo":"#F39C12"};
    ovChartEst=new Chart($("ov-chart-est"),{
      type:"doughnut",
      data:{labels:estArr.map(e=>e[0]+" ("+e[1]+")"),datasets:[{data:estArr.map(e=>e[1]),backgroundColor:["#F39C12","#3498DB","#E74C3C","#2ECC71"]}]},
      options:{responsive:true,plugins:{legend:{position:"bottom"}}}
    });
  }

  // Detail table: top 10 OC lines for this buyer
  var detHTML="";
  if(oc){
    var lines=OC.filter(d=>d.comp===name).sort((a,b)=>b.val-a.val).slice(0,15);
    detHTML+='<h4>Top 15 Lineas OC por Valor</h4>';
    detHTML+='<table class="ov-table"><thead><tr><th>OC</th><th>Material</th><th>Proveedor</th><th>Cant.</th><th>Pend.</th><th>Valor</th><th>Fe.Entrega</th><th>Venc.</th></tr></thead><tbody>';
    lines.forEach(d=>{
      var vcls=d.venc?(d.dias>30?"b-red":"b-orange"):"b-green";
      detHTML+='<tr><td class="text-center">'+d.doc+'</td><td class="text-left">'+d.mat+'</td>'
        +'<td class="text-left">'+d.prov+'</td><td class="text-right">'+d.cant+'</td>'
        +'<td class="text-right">'+d.pend+'</td><td class="text-right">'+fmt(d.val)+'</td>'
        +'<td class="text-center">'+d.fe_ent+'</td>'
        +'<td class="text-center"><span class="badge '+vcls+'">'+(d.venc?d.dias+"d":"OK")+'</span></td></tr>';
    });
    detHTML+='</tbody></table>';
  }
  if(sol){
    var slines=SOL.filter(d=>d.comp===name).slice(0,10);
    if(slines.length>0){
      detHTML+='<h4 style="margin-top:15px">Solicitudes Pendientes (primeras 10)</h4>';
      detHTML+='<table class="ov-table"><thead><tr><th>Solicitud</th><th>Material</th><th>Estatus</th><th>Cant.</th><th>Fecha</th><th>Dias</th></tr></thead><tbody>';
      slines.forEach(d=>{
        var ecls=d.est.includes("echazada")?"b-red":d.est.includes("proceso")?"b-orange":"b-blue";
        detHTML+='<tr><td class="text-center">'+d.nsol+'</td><td class="text-left">'+d.mat+'</td>'
          +'<td class="text-center"><span class="badge '+ecls+'">'+d.est+'</span></td>'
          +'<td class="text-right">'+d.cant+'</td><td class="text-center">'+d.fe_sol+'</td>'
          +'<td class="text-center">'+d.dias+'</td></tr>';
      });
      detHTML+='</tbody></table>';
    }
  }
  $("ov-detail").innerHTML=detHTML;
  $("overlay").classList.add("show");
  document.body.style.overflow="hidden";
}
function closeOverlay(){
  $("overlay").classList.remove("show");
  document.body.style.overflow="";
}
// ESC to close
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeOverlay(); });

// === CHARTS TAB (lazy init) ===
function initCharts(){
  var gHTML='<div class="charts-grid">';
  gHTML+='<div class="chart-box"><h3>Lineas OC por Comprador</h3><canvas id="ch-comp"></canvas></div>';
  gHTML+='<div class="chart-box"><h3>Aging de Vencidas</h3><canvas id="ch-aging"></canvas></div>';
  gHTML+='<div class="chart-box"><h3>Valor OC por Comprador</h3><canvas id="ch-val"></canvas></div>';
  gHTML+='<div class="chart-box"><h3>Solicitudes por Estatus</h3><canvas id="ch-sol-est"></canvas></div>';
  gHTML+="</div>";
  $("tab-graficos").innerHTML=gHTML;

  var cLabels=compArr.map(e=>e[0]);
  var cVenc=compArr.map(e=>e[1].venc);
  var cOk=compArr.map(e=>e[1].lin-e[1].venc);
  new Chart($("ch-comp"),{type:"bar",data:{labels:cLabels,datasets:[{label:"Vencidas",data:cVenc,backgroundColor:"#E74C3C"},{label:"No vencidas",data:cOk,backgroundColor:"#3498DB"}]},options:{responsive:true,plugins:{legend:{position:"top"}},scales:{x:{stacked:true},y:{stacked:true}}}});

  new Chart($("ch-aging"),{type:"doughnut",data:{labels:Object.keys(aging),datasets:[{data:Object.values(aging),backgroundColor:["#2ECC71","#F39C12","#E67E22","#E74C3C","#8B0000"]}]},options:{responsive:true,plugins:{legend:{position:"right"}}}});

  new Chart($("ch-val"),{type:"bar",data:{labels:compArr.map(e=>e[0]),datasets:[{label:"Valor OC ($)",data:compArr.map(e=>Math.round(e[1].val)),backgroundColor:"#C8992A"}]},options:{responsive:true,indexAxis:"y",plugins:{legend:{display:false}}}});

  var solActivas=totLinSol-enProc-rechazadas;
  new Chart($("ch-sol-est"),{type:"pie",data:{labels:["En proceso ("+enProc+")","Rechazadas ("+rechazadas+")","Activas ("+solActivas+")"],datasets:[{data:[enProc,rechazadas,solActivas],backgroundColor:["#F39C12","#E74C3C","#3498DB"]}]},options:{responsive:true,plugins:{legend:{position:"right"}}}});
}

$("fecha-gen").textContent=new Date().toLocaleDateString("es-DO",{day:"2-digit",month:"2-digit",year:"numeric"});
</script>
